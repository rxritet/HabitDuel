services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: habitduel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_password}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    # migrate.dart uses CWD-relative paths: ../.env and ../migrations
    # Working dir /app/server means ../  resolves to /app
    working_dir: /app/server
    command: /app/bin/migrate
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: habitduel
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-your_password}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  server:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: habitduel
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-your_password}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
